<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <circle cx="300" cy="300" r="280" stroke="#ea580c" stroke-width="2" stroke-opacity="0.2" fill="none"/>
  <circle cx="300" cy="300" r="220" stroke="#ea580c" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <!-- Back plate -->
  <circle cx="300" cy="300" r="180" fill="url(#plateGrad)" stroke="#4b5563" stroke-width="3"/>
  <circle cx="300" cy="300" r="50" fill="#1f2937" stroke="#6b7280" stroke-width="2"/>
  <!-- Middle plate offset -->
  <circle cx="320" cy="280" r="140" fill="#374151" stroke="#ea580c" stroke-width="4" opacity="0.9"/>
  <circle cx="320" cy="280" r="40" fill="#1f2937" stroke="#f97316" stroke-width="2"/>
  <!-- Front plate -->
  <circle cx="340" cy="260" r="100" fill="url(#plateGrad)" stroke="url(#accentGrad)" stroke-width="5"/>
  <circle cx="340" cy="260" r="30" fill="#111827" stroke="#ea580c" stroke-width="3"/>
  <!-- Modular connector dots -->
  <circle cx="340" cy="180" r="8" fill="#ea580c"/>
  <circle cx="420" cy="260" r="8" fill="#ea580c"/>
  <circle cx="340" cy="340" r="8" fill="#ea580c"/>
  <circle cx="260" cy="260" r="8" fill="#ea580c"/>
  <!-- Label -->
  <text x="300" cy="520" text-anchor="middle" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="14" font-weight="600">APEX MODULAR PLATE SYSTEM</text>
</svg>
