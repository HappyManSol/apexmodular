  <!-- Plates on rack -->
  <circle cx="350" cy="180" r="35" fill="#374151" stroke="#ea580c" stroke-width="3"/>
  <circle cx="450" cy="180" r="35" fill="#4b5563" stroke="#ea580c" stroke-width="3"/>
  <circle cx="350" cy="260" r="35" fill="#374151" stroke="#f97316" stroke-width="3"/>
  <circle cx="450" cy="260" r="35" fill="#4b5563" stroke="#ea580c" stroke-width="3"/>
