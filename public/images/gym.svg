  <!-- Barbell -->
  <rect x="100" y="420" width="600" height="12" rx="6" fill="#94a3b8"/>
  <circle cx="150" cy="426" r="45" fill="#374151" stroke="#ea580c" stroke-width="4"/>
  <circle cx="650" cy="426" r="45" fill="#374151" stroke="#ea580c" stroke-width="4"/>
  <text x="400" y="560" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="16" font-weight="600">PREMIUM GYM FLOOR</text>
