<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0f172a"/>
  <rect x="0" y="450" width="800" height="150" fill="#1e293b"/>
  <!-- Rack -->
  <rect x="200" y="120" width="400" height="350" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <rect x="220" y="140" width="360" height="8" fill="#64748b"/>
  <rect x="220" y="220" width="360" height="8" fill="#64748b"/>
  <rect x="220" y="300" width="360" height="8" fill="#64748b"/>
