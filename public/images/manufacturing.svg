<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#111827"/>
  <rect x="0" y="400" width="800" height="200" fill="#1f2937"/>
  <!-- Conveyor -->
  <rect x="50" y="350" width="700" height="20" rx="4" fill="#374151"/>
  <rect x="100" y="320" width="80" height="80" rx="40" fill="#374151" stroke="#ea580c" stroke-width="3"/>
  <rect x="250" y="320" width="80" height="80" rx="40" fill="#4b5563" stroke="#ea580c" stroke-width="3"/>
  <rect x="400" y="320" width="80" height="80" rx="40" fill="#374151" stroke="#f97316" stroke-width="3"/>
  <rect x="550" y="320" width="80" height="80" rx="40" fill="#4b5563" stroke="#ea580c" stroke-width="3"/>
  <!-- Machine arm -->
  <rect x="620" y="150" width="30" height="200" fill="#6b7280"/>
  <rect x="580" y="140" width="110" height="30" rx="4" fill="#9ca3af"/>
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#374151" stroke-width="1" stroke-dasharray="8 8"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#374151" stroke-width="1" stroke-dasharray="8 8"/>
  <text x="400" y="80" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="16" font-weight="600">OEM PRODUCTION LINE</text>
</svg>
